<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop | Products</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .products-header {
      background: var(--light);
      padding: 40px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .products-header h1 {
      font-family: var(--font-head);
      font-size: clamp(24px,4vw,40px);
      color: var(--dark);
      margin-bottom: 8px;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px 0;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
      flex: 1;
      max-width: 380px;
    }
    .search-box input {
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
      background: transparent;
    }
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .filter-row select {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      background: var(--white);
      cursor: pointer;
    }
    .results-count { color: var(--grey); font-size: 13px; }
  </style>
</head>
<body>

<div class="products-header">
  <div class="container">
    <h1>All Products</h1>
    <div class="toolbar">
      <div class="search-box">
        🔍 <input type="text" id="search-input" placeholder="Search products…" oninput="applyFilters()">
      </div>
      <div class="filter-row">
        <select id="cat-filter" onchange="applyFilters()">
          <option value="">All Categories</option>
        </select>
        <select id="sort-filter" onchange="applyFilters()">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low → High</option>
          <option value="price-desc">Price: High → Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>
    <div class="results-count" id="results-count"></div>
  </div>
</div>

<section class="page-section tight">
  <div class="container">
    <div class="product-grid" id="product-grid"></div>
  </div>
</section>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/components.js"></script>
<script>
let allProducts = [];

document.addEventListener('DOMContentLoaded', async () => {
  allProducts = await Store.getProducts();

  // Populate categories
  const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
  const sel  = document.getElementById('cat-filter');
  cats.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });

  // Check URL for category pre-filter
  const urlCat = new URLSearchParams(location.search).get('cat');
  if (urlCat) sel.value = urlCat;

  applyFilters();
});

function applyFilters() {
  const s        = Store.getSettingsSync();
  const query    = document.getElementById('search-input').value.toLowerCase();
  const cat      = document.getElementById('cat-filter').value;
  const sortBy   = document.getElementById('sort-filter').value;

  let list = allProducts.filter(p => {
    const matchQ = !query || p.name.toLowerCase().includes(query) || (p.description||'').toLowerCase().includes(query);
    const matchC = !cat || p.category === cat;
    return matchQ && matchC;
  });

  if (sortBy === 'price-asc')  list.sort((a,b) => a.price - b.price);
  if (sortBy === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (sortBy === 'name')       list.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('results-count').textContent = `${list.length} product${list.length!==1?'s':''} found`;
  renderProducts(list, s);
}

function renderProducts(products, s) {
  s = s || Store.getSettingsSync();
  const el = document.getElementById('product-grid');
  if (!products.length) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><h3>No products found</h3><p>Try different search terms or filters.</p></div>`;
    return;
  }
  el.innerHTML = products.map(p => {
    const discount = p.originalPrice ? Math.round((1-p.price/p.originalPrice)*100) : 0;
    const imgHtml  = p.image ? `<img src="${p.image}" alt="${p.name}">` : `<div class="product-placeholder">🛍️</div>`;
    return `
    <div class="product-card ${p.inStock?'':'out-of-stock'}" onclick="location.href='product.html?id=${p.id}'">
      <div class="product-img">
        ${imgHtml}
        ${p.badge ? `<span class="product-badge">${p.badge}</span>` : ''}
        ${!p.inStock ? `<span class="product-badge" style="background:#6c757d">Out of Stock</span>` : ''}
      </div>
      <div class="product-body">
        <div class="product-cat">${p.category||''}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">
          <span class="price-current">${s.currency}${p.price.toLocaleString()}</span>
          ${p.originalPrice ? `<span class="price-original">${s.currency}${p.originalPrice.toLocaleString()}</span>` : ''}
          ${discount>=5 ? `<span class="price-discount">${discount}% off</span>` : ''}
        </div>
      </div>
      <div class="product-footer">
        <button class="btn btn-atc" onclick="event.stopPropagation();addToCart('${p.id}')" ${!p.inStock?'disabled':''}>
          ${p.inStock ? '🛒 Add to Cart' : 'Out of Stock'}
        </button>
      </div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
