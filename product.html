<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | MyShop</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <div class="breadcrumb">
    <a href="index.html">Home</a> <span>/</span>
    <a href="products.html">Products</a> <span>/</span>
    <span id="bc-name">Loading…</span>
  </div>

  <div class="product-detail" id="product-detail">
    <div class="empty-state"><p>Loading…</p></div>
  </div>

  <!-- Related products -->
  <div class="page-section">
    <div class="section-title">
      <h2>You May Also Like</h2>
      <div class="title-rule"></div>
    </div>
    <div class="product-grid" id="related-grid"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const id = new URLSearchParams(location.search).get('id');
  const [p, s, allProducts] = await Promise.all([
    Store.getProduct(id),
    Store.getSettings(),
    Store.getProducts()
  ]);

  if (!p) {
    document.getElementById('product-detail').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><div class="icon">😕</div><h3>Product not found</h3><a href="products.html" class="btn btn-dark mt-16">Back to Products</a></div>`;
    return;
  }

  document.title = p.name + ' | ' + s.storeName;
  document.getElementById('bc-name').textContent = p.name;

  const discount = p.originalPrice ? Math.round((1-p.price/p.originalPrice)*100) : 0;
  const imgHtml  = p.image
    ? `<img src="${p.image}" alt="${p.name}">`
    : `<div style="font-size:100px;opacity:.35">🛍️</div>`;

  document.getElementById('product-detail').innerHTML = `
    <div class="product-detail-img">${imgHtml}</div>
    <div class="product-detail-body">
      ${p.category ? `<div class="product-cat" style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--grey);margin-bottom:8px">${p.category}</div>` : ''}
      <h1>${p.name}</h1>
      ${p.badge ? `<span class="tag text-accent" style="margin-top:8px;display:inline-block">${p.badge}</span>` : ''}
      <div class="product-detail-price">
        <span class="detail-price">${s.currency}${p.price.toLocaleString()}</span>
        ${p.originalPrice ? `<span class="price-original" style="font-size:18px">${s.currency}${p.originalPrice.toLocaleString()}</span>` : ''}
        ${discount>=5 ? `<span class="price-discount">${discount}% off</span>` : ''}
      </div>
      <p>${p.description || 'No description available.'}</p>

      ${p.inStock ? `
      <div class="qty-select">
        <label>Quantity:</label>
        <div class="qty-box">
          <button onclick="changeQty(-1)">−</button>
          <input type="number" id="qty-input" value="1" min="1" max="99">
          <button onclick="changeQty(1)">+</button>
        </div>
      </div>
      <div class="detail-actions">
        <button class="btn btn-primary" onclick="doAddToCart('${p.id}')">🛒 Add to Cart</button>
        <button class="btn btn-dark" onclick="buyNow('${p.id}')">Buy Now →</button>
      </div>` : `
      <div class="tag mt-24" style="font-size:15px;padding:10px 20px;background:#fff0f0;border-color:#ffcdd2;color:#c0392b">❌ Out of Stock</div>`}

      <div class="divider"></div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <span class="tag">🚚 Free shipping ₹500+</span>
        <span class="tag">🔄 7-day returns</span>
        <span class="tag">✅ Genuine product</span>
      </div>
    </div>`;

  // Related products
  const related = allProducts.filter(r => r.id !== p.id && r.category === p.category).slice(0,4);
  const relEl   = document.getElementById('related-grid');
  if (related.length) {
    relEl.innerHTML = related.map(r => {
      const img = r.image ? `<img src="${r.image}" alt="${r.name}">` : `<div class="product-placeholder">🛍️</div>`;
      return `
      <div class="product-card" onclick="location.href='product.html?id=${r.id}'">
        <div class="product-img">${img}${r.badge?`<span class="product-badge">${r.badge}</span>`:''}</div>
        <div class="product-body">
          <div class="product-cat">${r.category||''}</div>
          <div class="product-name">${r.name}</div>
          <div class="product-price"><span class="price-current">${s.currency}${r.price.toLocaleString()}</span></div>
        </div>
        <div class="product-footer">
          <button class="btn btn-atc" onclick="event.stopPropagation();addToCart('${r.id}')">🛒 Add to Cart</button>
        </div>
      </div>`;
    }).join('');
  } else {
    relEl.closest('.page-section').style.display = 'none';
  }
});

function changeQty(delta) {
  const inp = document.getElementById('qty-input');
  if (!inp) return;
  inp.value = Math.max(1, parseInt(inp.value||1) + delta);
}

function doAddToCart(id) {
  const qty = parseInt(document.getElementById('qty-input')?.value || 1);
  addToCart(id, qty);
  CartDrawer.open();
}

function buyNow(id) {
  const qty = parseInt(document.getElementById('qty-input')?.value || 1);
  addToCart(id, qty);
  Checkout.open();
}
</script>
</body>
</html>
